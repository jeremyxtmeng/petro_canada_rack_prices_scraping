name: Daily Petro-Canada Rack Price Scraper

on:
  # 1. Scheduled Trigger (Runs every day at 10:00 UTC / 6:00 AM EST)
  #schedule:
    #- cron: '0 10 * * *'

  # 2. Manual Trigger (Adds a "Run workflow" button in the GitHub UI)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage pandas lxml

      - name: Run Scraper
        run: |
          xvfb-run --auto-servernum python scrape_drission.py

      - name: Commit Scraped Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git commit -m "Manual data update: $(date +'%Y-%m-%d')" || exit 0
          git push
