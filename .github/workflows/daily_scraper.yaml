name: Daily Petro-Canada Rack Price Scraper

on:
  # 1. Scheduled Trigger (Runs every day at 10:00 UTC / 6:00 AM EST)
  schedule:
    - cron: '0 10 * * *'

  # 2. Manual Trigger (Adds a "Run workflow" button in the GitHub UI)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install Google Chrome and Xvfb (Virtual Display)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb

      # Step 4: Install Python packages
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage pandas lxml

      # Step 5: Run DrissionPage inside Xvfb virtual frame buffer
      - name: Run Scraper
        run: |
          xvfb-run --auto-servernum python scrape_petro_canada.py

      # Step 6: Commit and Push the generated CSV back to the repository
      - name: Commit Scraped Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git commit -m "Automated data update: $(date +'%Y-%m-%d')" || exit 0
          git push